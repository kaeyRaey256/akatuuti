<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Akatuuti Intelligence</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>
:root {
  --bg: #eef7f6;
  --glass: rgba(255,255,255,0.6);
  --border: rgba(255,255,255,0.3);
  --text: #0f2f2c;
  --accent: linear-gradient(135deg,#d4af37,#f5d76e);
}

* {
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Inter',sans-serif;
}

body {
  background: var(--bg);
  color: var(--text);
}

/* NAV */
nav {
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:20px 40px;
}

nav h1 {
  font-weight:600;
  letter-spacing:-0.5px;
}

nav button {
  padding:10px 18px;
  border:none;
  border-radius:999px;
  background:var(--accent);
  cursor:pointer;
}

/* HERO */
.hero {
  text-align:center;
  padding:100px 20px;
  max-width:800px;
  margin:auto;
}

.hero h2 {
  font-size:3rem;
  font-weight:600;
  margin-bottom:10px;
}

.hero p {
  opacity:0.7;
  margin-bottom:30px;
}

.cta {
  padding:14px 28px;
  border-radius:999px;
  border:none;
  background:var(--accent);
  font-size:1rem;
  cursor:pointer;
}

/* GLASS CARD */
.card {
  background: var(--glass);
  backdrop-filter: blur(12px);
  border:1px solid var(--border);
  border-radius:20px;
  padding:20px;
  transition:0.3s ease;
}

.card:hover {
  transform: translateY(-4px);
}

/* GRID */
.grid {
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
  gap:20px;
  padding:40px;
}

/* SECTION */
.section {
  display:none;
}

.active {
  display:block;
}

/* INPUT */
input {
  width:100%;
  padding:12px;
  border-radius:12px;
  border:none;
  margin:10px 0;
}

/* DASH */
.stats {
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
  gap:20px;
  padding:40px;
}

.stat h3 {
  opacity:0.6;
  font-size:0.9rem;
}

.stat h2 {
  margin-top:5px;
}

/* FADE */
.fade {
  animation: fade .5s ease;
}

@keyframes fade {
  from {opacity:0; transform:translateY(10px);}
  to {opacity:1;}
}

/* MOBILE */
@media(max-width:600px){
  .hero h2 {font-size:2rem;}
}
</style>
</head>

<body>

<nav>
  <h1>Akatuuti</h1>
  <button onclick="navTo('profile')">Join</button>
</nav>

<!-- HOME -->
<div id="home" class="section active fade">
  <div class="hero">
    <h2>Creative Economy Intelligence</h2>
    <p>Find opportunities. Get discovered. Track impact.</p>
    <button class="cta" onclick="navTo('opps')">Explore Opportunities</button>
  </div>
</div>

<!-- OPPS -->
<div id="opps" class="section fade">
  <div class="grid" id="oppList"></div>
</div>

<!-- PROFILE -->
<div id="profile" class="section fade">
  <div class="grid">
    <div class="card">
      <h2>Create Profile</h2>
      <input id="name" placeholder="Name">
      <input id="discipline" placeholder="Discipline">
      <input id="location" placeholder="Location">
      <button class="cta" onclick="saveProfile()">Save Profile</button>
    </div>
  </div>
</div>

<!-- DASHBOARD -->
<div id="dashboard" class="section fade">
  <div class="stats">
    <div class="card stat">
      <h3>Impact Score</h3>
      <h2 id="impact">0</h2>
    </div>
    <div class="card stat">
      <h3>Match Score</h3>
      <h2 id="match">0%</h2>
    </div>
    <div class="card stat">
      <h3>Funding</h3>
      <h2 id="funding">$0</h2>
    </div>
  </div>
</div>

<script>

// NAV
function navTo(id){
  document.querySelectorAll(".section").forEach(s=>s.classList.remove("active"));
  document.getElementById(id).classList.add("active");
}

// DATA
const opps = [
  "Creative Grant",
  "Film Residency",
  "Music Fund"
];

// LOAD OPPS
opps.forEach(o=>{
  oppList.innerHTML += `
    <div class="card">
      <h3>${o}</h3>
      <button class="cta" onclick="navTo('profile')">Apply</button>
    </div>
  `;
});

// SAVE PROFILE
function saveProfile(){
  impact.innerText = Math.floor(Math.random()*100);
  match.innerText = Math.floor(Math.random()*40+60)+"%";
  funding.innerText = "$"+Math.floor(Math.random()*20000);

  navTo('dashboard');
}

</script>

</body>
</html>
